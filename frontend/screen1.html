<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"> <!--allows emojis,symbols and different languages -->
    <title>PolyChat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>PolyChat</span>
        </div>
        <button class="new-chat-btn">+ New Chat</button>
        <div class="chat-history">
            <div class="chat-item">No chats</div>
        </div>
    </div>

    <div class="main-content">
        <h1>Select a Model</h1>
        
        <div class="model-selector">
            <button class="model-btn active" data-model="gpt-4o">GPT-4o</button>
            <button class="model-btn" data-model="gemini-2.5">Gemini 2.5</button>
            <button class="model-btn" data-model="cohere">Cohere</button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="userInput" placeholder="Ask anything...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
